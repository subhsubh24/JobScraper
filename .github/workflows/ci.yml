name: CI
on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded in-progress runs for the same PR — the autonomous loop pushes commits in rapid
# succession; without this every intermediate push ran full CI to completion. Only PR runs cancel.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  preflight-ci:
    name: preflight (lint + typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the self-validation gate can diff against the PR base
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements-dev.txt
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            mobile/package-lock.json
      - run: cd web && npm ci
      - run: cd mobile && npm ci
      # No live-API secrets here: the REAL Gemini/Stripe tests are marked `live` and deselected
      # per-PR (`pytest -m "not live"` in preflight). They run NIGHTLY (.github/workflows/nightly.yml)
      # so PRs stay fast and never make live calls.
      - run: bash scripts/preflight.sh ci

  functional-journeys:
    name: functional journeys (web E2E)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements-dev.txt
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci
      - name: Install Playwright browser
        run: cd web && npx playwright install --with-deps chromium
      - name: Build web (GOTCHA a — NEXT_PUBLIC_API_URL baked at build time)
        run: cd web && NEXT_PUBLIC_API_URL=http://127.0.0.1:8000 npm run build
      - name: Run functional journeys
        # GOTCHA b — the API server (started by playwright.config.ts) gets the test-only
        # E2E_DISABLE_RATE_LIMIT=1 so the single-runner IP does not trip the limiter.
        # Prod never sets it; asgi.py refuses to boot with it on Vercel.
        run: cd web && CI=1 npm run e2e
      - name: Upload report + screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-and-screenshots
          path: |
            web/playwright-report/
            web/e2e/__screenshots__/
          retention-days: 14

  # PART B — auto-migrate on deploy. Runs ONLY on push to main, ONLY after both gate jobs
  # pass, forward-only (`alembic upgrade head` — NEVER downgrade/reset). Skips cleanly until
  # the owner sets the DATABASE_URL secret (so it never reddens main during setup). See
  # docs/ci/PROPOSED_CI.md "Part B" + OWNER_ACTION `auto-migrate` for PITR + the one-time
  # `alembic stamp head` baseline.
  migrate:
    name: migrate (alembic upgrade head — main only)
    needs: [preflight-ci, functional-journeys]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements-dev.txt
      - name: Apply forward-only migrations to production
        env:
          # Neon pooled connection string — set as a GitHub Actions SECRET, never inline.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret not set — skipping auto-migrate (see OWNER_ACTION auto-migrate)."
            exit 0
          fi
          alembic upgrade head
