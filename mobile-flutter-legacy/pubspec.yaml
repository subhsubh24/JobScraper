name: career_operator
description: AI-powered job search app

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # HTTP & API
  http: ^1.1.0

  # Local storage
  shared_preferences: ^2.2.2

  # UI components
  cupertino_icons: ^1.0.6
  flutter_markdown: ^0.6.18

  # Forms & validation
  email_validator: ^2.1.17

  # Utils
  intl: ^0.18.1
  url_launcher: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/
