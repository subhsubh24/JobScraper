[coverage:run]
branch = True
source = src,asgi
omit =
    */__pycache__/*
    tests/*

[coverage:report]
# Backend coverage floor (Track E). Set conservatively below the current measured branch
# coverage (~69%) so it ratchets against regressions without churn. Raise it as coverage
# genuinely improves (legacy unused modules main.py/crm/utils currently drag the total).
fail_under = 65
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:
    raise NotImplementedError
    if TYPE_CHECKING:

[flake8]
max-line-length = 120
extend-ignore = E203, W503
exclude =
    .git,
    __pycache__,
    build,
    dist,
    venv,
    .venv,
    env,
    node_modules,
    mobile,
    mobile-flutter-legacy,
    docs,
    data
per-file-ignores =
    tests/conftest.py:E402
    # Legacy entrypoints: load_dotenv()/sys.path before imports is intentional.
    # Deeper cleanup is tracked under ROADMAP Track A.
    cli.py:E402
    app.py:E402,E712,E128,E501
    scripts/init_db.py:E402
