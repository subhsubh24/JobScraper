[coverage:run]
branch = True
source = src,asgi
omit =
    */__pycache__/*
    tests/*
    # Orphaned module NOT imported by asgi.py or any shipped src/ path (grep-confirmed:
    # zero callers). Omitted so the floor measures the LIVE surface, not dead weight — this
    # is omitting confirmed-dead code, NOT gaming away real source. Retire or cover to remove.
    # (The former CLI dead path — cli.py, src/main.py, src/crm/ — was retired outright.)
    src/utils/__init__.py

[coverage:report]
# Backend coverage floor (Track E), measured over the LIVE surface (orphans omitted above).
# Actual is ~91% (the CI command `pytest -m "not live" --cov` over src,asgi). The floor sat at
# 75 — a ~16pt gap that let a real regression erode coverage silently; the independent
# QUALITY_SCORECARD flagged it as a loose ratchet. Raised to 85 (a genuine tightening with a
# ~6pt honest buffer for hard-to-trigger error/timeout/degradation paths). Raise further as
# coverage genuinely improves; never lower it to make a red build pass.
fail_under = 85
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:
    raise NotImplementedError
    if TYPE_CHECKING:

[tool:pytest]
markers =
    live: exercises a REAL external API (Gemini / Stripe test-mode). Runs NIGHTLY
        (.github/workflows/nightly.yml); deselected per-PR via `-m "not live"` so PRs stay fast
        and make no live calls. Deterministic evals still run per-PR.

[flake8]
max-line-length = 120
extend-ignore = E203, W503
exclude =
    .git,
    __pycache__,
    build,
    dist,
    venv,
    .venv,
    env,
    node_modules,
    mobile,
    mobile-flutter-legacy,
    docs,
    data,
    # Alembic autogenerated migration scripts (generated by `alembic revision`, not
    # hand-edited style). env.py IS linted; only the generated versions/ are excluded.
    migrations/versions
per-file-ignores =
    tests/conftest.py:E402
    scripts/init_db.py:E402
    # Alembic env.py: sys.path bootstrap before the metadata import is intentional.
    migrations/env.py:E402
