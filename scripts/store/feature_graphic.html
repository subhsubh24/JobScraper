<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1024px; height:500px; overflow:hidden; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #0B1020;
    color: #F4F6FB;
    position: relative;
  }
  .wash {
    position:absolute; inset:0;
    background:
      radial-gradient(640px 480px at 90% -14%, rgba(99,102,241,0.30), transparent 60%),
      radial-gradient(480px 400px at 102% 118%, rgba(99,102,241,0.10), transparent 55%);
  }
  .grid {
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(148,166,194,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(148,166,194,0.05) 1px, transparent 1px);
    background-size: 46px 46px;
    mask-image: radial-gradient(680px 480px at 84% 0%, #000 0%, transparent 70%);
  }
  .stage { position:relative; height:100%; padding:44px 60px 40px; display:flex; flex-direction:column; }
  .topline { display:flex; align-items:flex-start; justify-content:space-between; }
  .brandrow { display:flex; align-items:center; gap:13px; }
  .mark {
    width:40px; height:40px; border-radius:12px;
    background: linear-gradient(150deg, #6366F1, #4F46E5);
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 6px 20px rgba(79,70,229,0.45);
  }
  .mark svg { width:23px; height:23px; }
  .brand { font-size:23px; font-weight:700; letter-spacing:-0.01em; }
  .fit {
    width:96px; height:96px; border-radius:22px;
    background:#151B2E; border:1px solid #2A3554;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    box-shadow: 0 16px 40px rgba(0,0,0,0.4);
  }
  .fit .n { font-size:40px; font-weight:800; color:#34D399; line-height:1; letter-spacing:-0.02em; font-variant-numeric: tabular-nums; }
  .fit .l { margin-top:7px; font-size:11px; color:#9AA6C2; letter-spacing:0.08em; text-transform:uppercase; font-weight:600; }
  .headline {
    margin-top:30px; font-size:50px; line-height:1.06; font-weight:800;
    letter-spacing:-0.028em; max-width:730px;
  }
  .headline .accent { color:#A5B4FC; }
  .sub { margin-top:16px; font-size:20px; line-height:1.4; color:#9AA6C2; font-weight:400; max-width:600px; }
  .chips { margin-top:30px; display:flex; gap:11px; }
  .chip {
    display:flex; align-items:center; gap:9px;
    padding:11px 15px; border-radius:12px;
    background:#151B2E; border:1px solid #2A3554;
    font-size:15px; color:#C7D0E4; font-weight:500; white-space:nowrap;
  }
  .dot { width:9px; height:9px; border-radius:50%; flex:none; }
</style>
</head>
<body>
  <div class="wash"></div>
  <div class="grid"></div>
  <div class="stage">
    <div class="topline">
      <div class="brandrow">
        <div class="mark">
          <svg viewBox="0 0 24 24" fill="none"><path d="M4 15 L12 6 L20 15" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 18.5 L12 13.5 L16 18.5" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/></svg>
        </div>
        <div class="brand">Career Operator</div>
      </div>
      <div class="fit"><div class="n">82</div><div class="l">Fit</div></div>
    </div>

    <div class="headline">Run your job search<br>like an <span class="accent">operator</span>.</div>
    <div class="sub">Fit scoring, role-specific interview prep, and an AI coach — over one pipeline.</div>

    <div class="chips">
      <div class="chip"><span class="dot" style="background:#34D399"></span>Fit score &amp; why</div>
      <div class="chip"><span class="dot" style="background:#6366F1"></span>Mock interviews</div>
      <div class="chip"><span class="dot" style="background:#FBBF24"></span>Tailored résumé</div>
      <div class="chip"><span class="dot" style="background:#9AA6C2"></span>Pipeline CRM</div>
    </div>
  </div>
</body>
</html>
